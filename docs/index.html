<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Bit Sack Race</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <div id="hud-overlay">
            <div class="hud-box">SCORE: <span id="score-val">0000</span></div>
            <div class="hud-box timer">TIME: <span id="timer-val">0:09</span></div>
        </div>
        
        <canvas id="gameCanvas" width="900" height="500"></canvas>
        
        <div id="leaderboard">
            <h3>LEADERBOARD</h3>
            <ol id="leaderboard-list">
                <li>CANER [P1] (1st)</li>
                <li>AYŞE (2nd)</li>
                <li>ALİ (3rd)</li>
                <li>CAN (4th)</li>
            </ol>
        </div>

        <div id="screen-overlay" class="hidden">
            <h1 id="screen-title">RACE FINISHED</h1>
            <p id="screen-sub">Press SPACE to Restart</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
